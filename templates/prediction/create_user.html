{% extends 'base.html' %}

{% block content %}
<div class="auth-container" style="min-height: calc(100vh - 80px);">
    <div class="glass-card auth-card" style="max-width: 500px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2>Create New User</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Admin Panel</p>
        </div>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <span style="color: var(--danger); font-size: 0.8rem;">{{ field.errors.0 }}</span>
                {% endif %}
            </div>
            {% endfor %}
            <div class="form-group">
                <label for="role">Assign Role</label>
                <select name="role" id="role">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Create</button>
        </form>
    </div>
</div>
{% endblock %}
