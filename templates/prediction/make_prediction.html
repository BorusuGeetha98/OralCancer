{% extends 'base.html' %}

{% block content %}
<div class="auth-container" style="min-height: calc(100vh - 80px);">
    <div class="glass-card auth-card" style="max-width: 600px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fa-solid fa-microscope fa-3x" style="color: var(--primary-color);"></i>
            <h2>Make a Prediction</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Upload an image to detect oral cancer risk.</p>
        </div>
        
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label for="{{ form.image.id_for_label }}">Upload Image</label>
                {{ form.image }}
            </div>
            
            <button type="submit" class="btn btn-primary" style="margin-top: 1rem; width: 100%;">Analyze Image <i class="fa-solid fa-wand-magic-sparkles"></i></button>
        </form>
    </div>
</div>
{% endblock %}
