{% extends 'base.html' %}

{% block content %}
<div class="auth-container" style="min-height: calc(100vh - 80px);">
    <div class="glass-card auth-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fa-solid fa-tooth fa-3x" style="color: var(--primary-color);"></i>
            <h2>Sign In</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Oral Cancer Detection System</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Login ID / Username</label>
                {{ form.username }}
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="{% url 'register' %}" class="link-muted">Don't have an account? Register</a>
        </div>
    </div>
</div>
{% endblock %}
