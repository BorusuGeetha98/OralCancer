{% extends 'base.html' %}

{% block content %}
<div class="auth-container" style="min-height: calc(100vh - 80px);">
    <div class="glass-card auth-card" style="max-width: 500px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fa-solid fa-address-card fa-3x" style="color: var(--primary-color);"></i>
            <h2>User Details</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Your account profile</p>
        </div>

        <div style="margin-top: 1rem; padding: 1.5rem; background: rgba(15, 23, 42, 0.6); border-radius: 8px; border: 1px solid var(--border-color);">
            <p style="margin-bottom: 0.5rem;"><strong style="color: var(--text-muted);">Username:</strong> {{ user.username }}</p>
            <p style="margin-bottom: 0.5rem;"><strong style="color: var(--text-muted);">Email:</strong> {{ user.email }}</p>
            <p style="margin-bottom: 0.5rem;"><strong style="color: var(--text-muted);">Phone Number:</strong> {{ user.phone_number }}</p>
            <p style="margin-bottom: 0.5rem;"><strong style="color: var(--text-muted);">Role:</strong> <span class="badge {% if user.role == 'admin' %}badge-risk-high{% else %}badge-risk-low{% endif %}">{{ user.role|title }}</span></p>
        </div>
        
        <div style="margin-top: 2rem; text-align: center;">
            <a href="{% url 'user_dashboard' %}" class="btn btn-primary">Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
